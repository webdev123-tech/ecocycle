# Render deploy blueprint for EcoCycle (free web service)
# 1. Push this repo to GitHub
# 2. Render dashboard -> New -> Blueprint -> pick this repo
# 3. After first deploy, add the real keys under Environment (see server/.env.example)
services:
  - type: web
    name: ecocycle
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/status
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false   # set to the live https URL after first deploy
      # paste real integration keys in the dashboard (kept out of git):
      - { key: AT_USERNAME,     sync: false }
      - { key: AT_API_KEY,      sync: false }
      - { key: AT_SENDER_ID,    sync: false }
      - { key: SMTP_HOST,       sync: false }
      - { key: SMTP_PORT,       sync: false }
      - { key: SMTP_USER,       sync: false }
      - { key: SMTP_PASS,       sync: false }
      - { key: SMTP_FROM,       sync: false }
      - { key: FLW_SECRET_KEY,  sync: false }
      - { key: FLW_PUBLIC_KEY,  sync: false }
      - { key: FLW_CURRENCY,    value: UGX }
      - { key: GOOGLE_CLIENT_ID, sync: false }
